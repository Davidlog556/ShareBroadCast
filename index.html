<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareBroadCast - Custom Player Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>

    <style>
        :root {
            --bg-primary: #121212;
            --bg-card: #1e1e1e;
            --accent-neon: #00ffcc;
            --accent-pink: #ff0055;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .device-status-bar {
            background-color: #000000;
            color: var(--accent-neon);
            text-align: center;
            padding: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px solid #2a2a2a;
        }

        /* Login Gateway Overlay */
        #authOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .auth-card {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            border: 2px solid var(--accent-pink);
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.3);
        }

        #mainAppWrapper {
            display: none;
        }

        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #000000;
            border-bottom: 2px solid var(--accent-pink);
        }

        .site-header h1 {
            margin: 0;
            font-size: 1.6rem;
            color: var(--accent-pink);
            letter-spacing: 1px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--accent-neon);
            background-color: #333;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }

        /* CUSTOM VIDEO PLAYER CONTAINER */
        .player-box {
            background-color: #000000;
            border: 2px solid var(--accent-pink);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Removed native controls, video takes up screen space */
        video {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: contain;
            display: block;
        }

        .live-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--accent-pink);
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            display: none;
            z-index: 5;
        }

        /* CUSTOM MEDIA PLAYER CONTROLS BAR */
        .custom-controls {
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            gap: 15px;
            border-top: 1px solid #222;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .control-btn:hover {
            color: var(--accent-neon);
        }

        /* Custom Seek Progress Slider styling */
        .seek-slider {
            flex-grow: 1;
            accent-color: var(--accent-pink);
            cursor: pointer;
            height: 6px;
            border-radius: 3px;
        }

        .time-display {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: monospace;
            min-width: 90px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            width: 70px;
            accent-color: var(--accent-neon);
            cursor: pointer;
        }

        /* Dashboard styles */
        .dashboard {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #2a2a2a;
            margin-top: 15px;
        }

        .section-title {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--accent-neon);
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent-pink);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .btn-stream { background-color: var(--accent-neon); color: #000; }
        .btn-stop { background-color: #ff3333; display: none; }

        .input-box {
            width: 100%;
            background-color: #121212;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            font-size: 0.95rem;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .feed-scrollbox {
            max-height: 350px;
            overflow-y: auto;
        }

        .feed-card {
            background-color: #262626;
            border-left: 4px solid var(--accent-neon);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .feed-card.is-live { border-left-color: var(--accent-pink); }
        .feed-card h4 { margin: 0 0 4px 0; font-size: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .feed-card p { margin: 0; font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }

        .type-pill {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 3px;
            background: #444;
            color: #fff;
        }

        @media (min-width: 768px) {
            .app-container { grid-template-columns: 2fr 1fr; }
            .btn { width: auto; }
        }
    </style>
</head>
<body>

    <div class="device-status-bar" id="deviceDisplayBar">DETECTING ECOSYSTEM NODE...</div>

    <div id="authOverlay">
        <div class="auth-card">
            <h2 style="color: var(--accent-pink); margin-top: 0;">SHAREBROADCAST</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px;">Connect your account profile to access active channels and saved media files.</p>
            <input type="text" id="authUsernameInput" class="input-box" placeholder="Enter Channel Username..." style="text-align: center;">
            <button class="btn" id="secureGatewayBtn" style="width: 100%;">Instant Secure Connect</button>
        </div>
    </div>

    <div id="mainAppWrapper">
        <header class="site-header">
            <h1>SHAREBROADCAST</h1>
            <div class="user-profile">
                <div class="user-avatar" id="avatarDisplay" style="display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--accent-neon);">U</div>
                <span id="userNameDisplay" style="font-size: 0.9rem; font-weight: 600;">Profile</span>
            </div>
        </header>

        <div class="app-container">
            <main>
                <div class="player-box">
                    <div class="live-tag" id="liveIndicatorTag">Live Stream</div>
                    
                    <video id="broadcastPlayer" autoplay playsinline></video>
                    
                    <div class="custom-controls" id="customControlsBar">
                        <button class="control-btn" id="playPauseBtn">▶</button>
                        
                        <input type="range" id="seekSlider" class="seek-slider" min="0" max="100" value="0">
                        
                        <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
                        
                        <div class="volume-container">
                            <button class="control-btn" id="muteBtn" style="font-size: 0.95rem;">🔊</button>
                            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.1" value="1">
                        </div>
                    </div>
                </div>

                <div class="dashboard">
                    <h3 class="section-title">Live Studio</h3>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-top:0;">
                        Channel Routing Key: <strong id="networkKeyDisplay" style="color:var(--accent-neon);">Connecting...</strong>
                    </p>
                    <input type="text" id="streamTitleInput" class="input-box" placeholder="Stream Title (Optional)">
                    <input type="text" id="streamDescInput" class="input-box" placeholder="Stream Description (Optional)">
                    <button class="btn btn-stream" id="initiateStreamBtn">Start Live Feed</button>
                    <button class="btn btn-stop" id="terminateStreamBtn">End Live Feed</button>
                </div>

                <div class="dashboard">
                    <h3 class="section-title">Save & Publish Media Files</h3>
                    <input type="text" id="uploadTitleInput" class="input-box" placeholder="Video Title (Optional)">
                    <input type="text" id="uploadDescInput" class="input-box" placeholder="Video Description (Optional)">
                    <label class="btn" style="background-color: #222; border: 1px solid var(--accent-pink); color: var(--accent-pink); margin-bottom:0;">
                        Upload & Save to Feed List
                        <input type="file" id="staticUpload" accept="video/*" style="display:none;">
                    </label>
                </div>
            </main>

            <aside>
                <div class="dashboard" style="margin-top:0;">
                    <h3 class="section-title">Your Saved Feed</h3>
                    <div class="search-wrapper">
                        <input type="text" id="feedSearchBox" class="input-box" style="margin-bottom:0;" placeholder="🔍 Search saved items...">
                    </div>
                    <div class="feed-scrollbox" id="feedDisplayGrid"></div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const deviceDisplayBar = document.getElementById('deviceDisplayBar');
        const authOverlay = document.getElementById('authOverlay');
        const mainAppWrapper = document.getElementById('mainAppWrapper');
        const avatarDisplay = document.getElementById('avatarDisplay');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const authUsernameInput = document.getElementById('authUsernameInput');
        const secureGatewayBtn = document.getElementById('secureGatewayBtn');
        
        const broadcastPlayer = document.getElementById('broadcastPlayer');
        const liveIndicatorTag = document.getElementById('liveIndicatorTag');
        const networkKeyDisplay = document.getElementById('networkKeyDisplay');
        const initiateStreamBtn = document.getElementById('initiateStreamBtn');
        const terminateStreamBtn = document.getElementById('terminateStreamBtn');
        const staticUpload = document.getElementById('staticUpload');
        const feedSearchBox = document.getElementById('feedSearchBox');
        const feedDisplayGrid = document.getElementById('feedDisplayGrid');

        const streamTitleInput = document.getElementById('streamTitleInput');
        const streamDescInput = document.getElementById('streamDescInput');
        const uploadTitleInput = document.getElementById('uploadTitleInput');
        const uploadDescInput = document.getElementById('uploadDescInput');

        // Custom player control bindings
        const playPauseBtn = document.getElementById('playPauseBtn');
        const seekSlider = document.getElementById('seekSlider');
        const timeDisplay = document.getElementById('timeDisplay');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const customControlsBar = document.getElementById('customControlsBar');

        let peerNode = null;
        let hardwareStreamReference = null;
        let platformFeed = [];

        // --- Core Optimization: Custom Media Player JavaScript Controllers ---
        
        // 1. Play / Pause Toggle Control
        playPauseBtn.addEventListener('click', togglePlayPause);
        broadcastPlayer.addEventListener('click', togglePlayPause); // Click video screen directly to pause

        function togglePlayPause() {
            if (broadcastPlayer.paused || broadcastPlayer.ended) {
                broadcastPlayer.play();
                playPauseBtn.textContent = "⏸";
            } else {
                broadcastPlayer.pause();
                playPauseBtn.textContent = "▶";
            }
        }

        // 2. Track Video Time Progress Changes
        broadcastPlayer.addEventListener('timeupdate', () => {
            if (!isNaN(broadcastPlayer.duration)) {
                // Update seek slider value position percentage
                const progressPercentage = (broadcastPlayer.currentTime / broadcastPlayer.duration) * 100;
                seekSlider.value = progressPercentage;

                // Format timestamp strings dynamically
                timeDisplay.textContent = `${formatTimestamp(broadcastPlayer.currentTime)} / ${formatTimestamp(broadcastPlayer.duration)}`;
            }
        });

        function formatTimestamp(secondsValue) {
            const minutes = Math.floor(secondsValue / 60);
            const seconds = Math.floor(secondsValue % 60);
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        // 3. Manual Seek Range Dragging Operations
        seekSlider.addEventListener('input', () => {
            if (!isNaN(broadcastPlayer.duration)) {
                const newTargetTime = (seekSlider.value / 100) * broadcastPlayer.duration;
                broadcastPlayer.currentTime = newTargetTime;
            }
        });

        // 4. Volume Slide Operations
        volumeSlider.addEventListener('input', (e) => {
            broadcastPlayer.volume = e.target.value;
            if (broadcastPlayer.volume === 0) {
                muteBtn.textContent = "🔇";
            } else if (broadcastPlayer.volume < 0.5) {
                muteBtn.textContent = "🔉";
            } else {
                muteBtn.textContent = "🔊";
            }
        });

        // 5. Instant Mute Button Click
        muteBtn.addEventListener('click', () => {
            broadcastPlayer.muted = !broadcastPlayer.muted;
            if (broadcastPlayer.muted) {
                muteBtn.textContent = "🔇";
                volumeSlider.value = 0;
            } else {
                muteBtn.textContent = "🔊";
                volumeSlider.value = broadcastPlayer.volume;
            }
        });


        // Device Sensing Engine
        function runHardwareDeviceScan() {
            const agentString = navigator.userAgent.toLowerCase();
            const windowWidth = window.innerWidth;
            let identifiedHardware = "PC / LAPTOP CONSOLE MODE";

            if (/mobi|android|iphone|ipod|blackberry|iemobile|opera mini/i.test(agentString)) {
                identifiedHardware = "MOBILE PORTABLE PHONE MODE";
            }
            if (/ipad|tablet|(android(?!.*mobi))/i.test(agentString) || (windowWidth >= 768 && windowWidth <= 1024 && 'ontouchstart' in window)) {
                identifiedHardware = "TABLET CONTROLLER PANEL MODE";
            }
            if (/windows nt/i.test(agentString) && /touch/i.test(agentString)) {
                identifiedHardware = "TABLET PC HYBRID INTERFACE";
            }
            deviceDisplayBar.textContent = `OPTIMIZED FOR: ${identifiedHardware}`;
        }

        secureGatewayBtn.addEventListener('click', () => {
            const enteredName = authUsernameInput.value.trim();
            if (enteredName === "") {
                alert("Please enter a username channel handle profile name.");
                return;
            }
            userNameDisplay.textContent = enteredName;
            avatarDisplay.textContent = enteredName.charAt(0).toUpperCase();
            authOverlay.style.display = "none";
            mainAppWrapper.style.display = "block";
            initializeApplicationCore();
        });

        window.onload = runHardwareDeviceScan;
        window.addEventListener('resize', runHardwareDeviceScan);

        function initializeApplicationCore() {
            peerNode = new Peer();
            peerNode.on('open', (id) => {
                networkKeyDisplay.textContent = id;
                loadSavedFeedFromStorage();
            });

            peerNode.on('call', (incomingCall) => {
                incomingCall.answer(hardwareStreamReference || null);
                incomingCall.on('stream', (incomingFeed) => {
                    broadcastPlayer.src = null;
                    broadcastPlayer.srcObject = incomingFeed;
                    liveIndicatorTag.style.display = "block";
                    customControlsBar.style.display = "none"; // Hide custom control seek sliders during active real-time live events
                });
            });
        }

        function loadSavedFeedFromStorage() {
            const preservedData = localStorage.getItem('sharebroadcast_saved_feed');
            const fallbackDefault = [{
                id: "default-welcome",
                type: "video",
                title: "Welcome Setup Guide",
                description: "Upload videos below to save them straight onto your automated browser account feed list."
            }];
            platformFeed = preservedData ? JSON.parse(preservedData) : fallbackDefault;
            renderDiscoveryFeed(platformFeed);
        }

        function commitFeedToPermanentStorage() {
            localStorage.setItem('sharebroadcast_saved_feed', JSON.stringify(platformFeed));
        }

        function renderDiscoveryFeed(itemsToRender) {
            feedDisplayGrid.innerHTML = "";
            itemsToRender.forEach(item => {
                const card = document.createElement('div');
                card.className = `feed-card ${item.type === 'live' ? 'is-live' : ''}`;
                card.innerHTML = `
                    <h4>
                        <span>${item.title}</span>
                        <span class="type-pill" style="background-color: ${item.type === 'live' ? 'var(--accent-pink)' : '#444'}">${item.type.toUpperCase()}</span>
                    </h4>
                    <p>${item.description}</p>
                `;
                card.addEventListener('click', () => executeContentSwitch(item));
                feedDisplayGrid.appendChild(card);
            });
        }

        feedSearchBox.addEventListener('input', (e) => {
            const searchString = e.target.value.toLowerCase().trim();
            const filteredResults = platformFeed.filter(item => {
                return item.title.toLowerCase().includes(searchString) || item.description.toLowerCase().includes(searchString);
            });
