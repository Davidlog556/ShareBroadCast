<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareBroadCast - Mobile Optimized Network</title>
    
    <!-- PeerJS Library for global cloud serverless streaming connection channels -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>

    <style>
        /* Modernized Mobile-First UI Foundation */
        :root {
            --bg-primary: #121212;
            --bg-card: #1e1e1e;
            --accent-neon: #00ffcc;
            --accent-pink: #ff0055;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .site-header {
            text-align: center;
            padding: 15px;
            background-color: #000000;
            border-bottom: 2px solid var(--accent-pink);
        }

        .site-header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
            color: var(--accent-pink);
        }

        /* Fluid Main Responsive Container Layout */
        .app-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Media Player Window Component */
        .player-viewport {
            background-color: #000000;
            border: 2px solid var(--accent-pink);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .status-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--accent-pink);
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            display: none;
            text-transform: uppercase;
        }

        /* Channel Selector & Dashboard Panel */
        .control-dashboard {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #2a2a2a;
        }

        .section-title {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--accent-neon);
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        /* Large Touch Target Buttons for Mobile Users */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent-pink);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }

        .btn:active { opacity: 0.8; }
        .btn-stream { background-color: var(--accent-neon); color: #000; }
        .btn-stop { background-color: #ff3333; display: none; }

        .input-box {
            width: 100%;
            background-color: #121212;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            font-size: 0.95rem;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        /* Live Content Feed Listing Directory */
        .feed-directory {
            margin-top: 15px;
        }

        .feed-item {
            background-color: #262626;
            border-left: 4px solid var(--accent-neon);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .feed-item:active { background-color: #333; }
        .feed-item h4 { margin: 0 0 4px 0; font-size: 0.95rem; }
        .feed-item p { margin: 0; font-size: 0.8rem; color: var(--text-muted); }

        /* Traditional Interactive Live Comments Element */
        .chat-container {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            height: 300px;
        }

        .chat-scroller {
            flex-grow: 1;
            padding: 12px;
            overflow-y: auto;
            list-style: none;
            margin: 0;
        }

        .chat-scroller li {
            font-size: 0.9rem;
            margin-bottom: 8px;
            line-height: 1.4;
            border-bottom: 1px solid #262626;
            padding-bottom: 4px;
        }

        .chat-scroller .user-tag {
            color: var(--accent-pink);
            font-weight: bold;
        }

        .chat-bar {
            padding: 10px;
            background-color: #1a1a1a;
            display: flex;
            gap: 8px;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        /* Desktop Layout Adaptations using Media Queries */
        @media (min-width: 768px) {
            .app-container {
                grid-template-columns: 2fr 1fr;
            }
            .site-header h1 { font-size: 2.3rem; }
            .btn { width: auto; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <h1>SHAREBROADCAST</h1>
    </header>

    <div class="app-container">
        
        <!-- Main Media Feed Content Area -->
        <main>
            <!-- Flexible Player Section -->
            <div class="player-viewport">
                <div class="status-badge" id="liveBadge">Live Stream</div>
                <video id="broadcastPlayer" controls autoplay playsinline></video>
            </div>

            <!-- Directory / Controller Operations Section -->
            <div class="control-dashboard" style="margin-top:15px;">
                <h3 class="section-title">Broadcast Controller</h3>
                
                <p style="font-size:0.85rem; color:var(--text-muted); margin-top:0;">
                    Your Network Device Key: <strong id="networkKeyDisplay" style="color:var(--accent-neon);">Connecting...</strong>
                </p>

                <button class="btn btn-stream" id="initiateStreamBtn">Start Live Feed</button>
                <button class="btn btn-stop" id="terminateStreamBtn">End Live Feed</button>

                <div style="margin-top: 15px; border-top: 1px solid #333; padding-top: 15px;">
                    <input type="text" id="streamKeyTarget" class="input-box" placeholder="Paste target streaming key here">
                    <button class="btn" id="tuneInBtn" style="background-color: #333; border: 1px solid var(--accent-pink);">Tune In to Key</button>
                </div>

                <div style="margin-top: 15px; border-top: 1px solid #333; padding-top: 15px;">
                    <label class="btn" style="background-color: #222; border: 1px solid var(--accent-neon); color: var(--accent-neon);">
                        Upload Static Video File
                        <input type="file" id="staticUpload" accept="video/*" style="display:none;">
                    </label>
                </div>
            </div>
        </main>

        <!-- Sidebar Panel: Controls & Feeds -->
        <aside>
            <!-- Platform Content Feed Directory -->
            <div class="control-dashboard" style="margin-bottom: 15px;">
                <h3 class="section-title">Available Channels</h3>
                <div class="feed-directory" id="directoryList">
                    <div class="feed-item" onclick="loadDefaultPlaceholder()">
                        <h4>Welcome Tutorial Setup</h4>
                        <p>Static System Video Asset</p>
                    </div>
                </div>
            </div>

            <!-- Stream Dialogue Board -->
            <div class="chat-container">
                <div style="padding:10px; font-weight:bold; font-size:0.85rem; border-bottom:1px solid #333; color:var(--accent-neon);">Live Content Chat</div>
                <ul class="chat-scroller" id="messageLog"></ul>
                <div class="chat-bar">
                    <input type="text" id="chatMsgInput" class="input-box" style="margin:0;" placeholder="Send comment...">
                    <button class="btn" id="broadcastMsgBtn" style="margin:0; padding:0 15px;">Send</button>
                </div>
            </div>
        </aside>

    </div>

    <script>
        const broadcastPlayer = document.getElementById('broadcastPlayer');
        const liveBadge = document.getElementById('liveBadge');
        const networkKeyDisplay = document.getElementById('networkKeyDisplay');
        const initiateStreamBtn = document.getElementById('initiateStreamBtn');
        const terminateStreamBtn = document.getElementById('terminateStreamBtn');
        const streamKeyTarget = document.getElementById('streamKeyTarget');
        const tuneInBtn = document.getElementById('tuneInBtn');
        const staticUpload = document.getElementById('staticUpload');
        const directoryList = document.getElementById('directoryList');
        const messageLog = document.getElementById('messageLog');
        const chatMsgInput = document.getElementById('chatMsgInput');
        const broadcastMsgBtn = document.getElementById('broadcastMsgBtn');

        let peerNode = new Peer();
        let hardwareStreamReference = null;
        let dataLinkChannel = null;

        peerNode.on('open', (id) => {
            networkKeyDisplay.textContent = id;
            pushSystemAlert("Device securely locked onto serverless cloud.");
        });

        // --- Stream Navigation Logic ---
        function loadDefaultPlaceholder() {
            broadcastPlayer.srcObject = null;
            broadcastPlayer.src = "movie.mp4"; // Targets relative file pathway
            liveBadge.style.display = "none";
            pushSystemAlert("Loading system introductory playback track.");
        }

        // Processing custom local static user video uploads
        staticUpload.addEventListener('change', (e) => {
            const chosenFile = e.target.files[0];
            if (chosenFile) {
                const objectLocation = URL.createObjectURL(chosenFile);
                
                // Switch video content cleanly
                broadcastPlayer.srcObject = null;
                broadcastPlayer.src = objectLocation;
                liveBadge.style.display = "none";

                // Append newly discovered dynamic items into choice listings
                const catalogCard = document.createElement('div');
                catalogCard.className = 'feed-item';
                catalogCard.style.borderColor = 'var(--accent-pink)';
                catalogCard.innerHTML = `
                    <h4>${chosenFile.name.split('.')[0]}</h4>
                    <p>Uploaded Local Asset File</p>
                `;
                catalogCard.addEventListener('click', () => {
                    broadcastPlayer.srcObject = null;
                    broadcastPlayer.src = objectLocation;
                    liveBadge.style.display = "none";
                });
                
                directoryList.insertBefore(catalogCard, directoryList.firstChild);
                pushSystemAlert("Static file mapped into catalog channel selection.");
            }
        });

        // --- Hardware Activation Controls ---
        initiateStreamBtn.addEventListener('click', async () => {
            try {
                // Media parameters customized to bypass mobile browser processing stalls
                hardwareStreamReference = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720, facingMode: "user" },
                    audio: true
                });
                broadcastPlayer.src = null;
                broadcastPlayer.srcObject = hardwareStreamReference;
                broadcastPlayer.muted = true; // Essential flag to bypass mobile playback block policies
                
                liveBadge.style.display = "block";
                initiateStreamBtn.style.display = "none";
                terminateStreamBtn.style.display = "inline-flex";
                pushSystemAlert("Your mobile camera is streaming live.");
            } catch (err) {
                alert("Please check your camera permission configurations.");
            }
        });

        terminateStreamBtn.addEventListener('click', () => {
            if (hardwareStreamReference) {
                hardwareStreamReference.getTracks().forEach(track => track.stop());
                hardwareStreamReference = null;
            }
            broadcastPlayer.srcObject = null;
            liveBadge.style.display = "none";
            terminateStreamBtn.style.display = "none";
            initiateStreamBtn.style.display = "inline-flex";
            pushSystemAlert("Stream feed killed. Hardware lenses offline.");
        });

        // --- Data Relay Operations ---
        broadcastMsgBtn.addEventListener('click', postComment);
        chatMsgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') postComment(); });

        function postComment() {
            const query = chatMsgInput.value.trim();
            if (query !== "") {
                if (dataLinkChannel && dataLinkChannel.open) {
                    dataLinkChannel.send({ type: "text", content: query });
                }
                appendLineItem("Me", query);
                chatMsgInput.value = "";
            }
        }

        function appendLineItem(author, text) {
            const node = document.createElement('li');
            node.innerHTML = `<span class="user-tag">${author}:</span> ${text}`;
            messageLog.appendChild(node);
            messageLog.scrollTop = messageLog.scrollHeight;
        }

        function pushSystemAlert(notice) {
            const node = document.createElement('li');
            node.innerHTML = `<span style="color:var(--accent-neon);">[System]:</span> ${notice}`;
            messageLog.appendChild(node);
        }

        peerNode.on('connection', (connectionInstance) => {
            dataLinkChannel = connectionInstance;
            dataLinkChannel.on('data', (payload) => {
                if (payload.type === "text") appendLineItem("Peer", payload.content);
            });
        });

        tuneInBtn.addEventListener('click', () => {
            const routingId = streamKeyTarget.value.trim();
            if (routingId) {
                dataLinkChannel = peerNode.connect(routingId);
                dataLinkChannel.on('data', (payload) => {
                    if (payload.type === "text") appendLineItem("Peer", payload.content);
                });

                navigator.mediaDevices.getUserMedia({ video: false, audio: false }).then((blankStream) => {
                    const trackingCall = peerNode.call(routingId, blankStream);
                    trackingCall.on('stream', (incomingFeed) => {
                        broadcastPlayer.src = null;
                        broadcastPlayer.srcObject = incomingFeed;
                        liveBadge.style.display = "block";
                    });
                });
                pushSystemAlert(`Requesting network attachment path: ${routingId}`);
            }
        });

        peerNode.on('call', (incomingCall) => {
            incomingCall.answer(hardwareStreamReference || null);
            incomingCall.on('stream', (incomingFeed) => {
                broadcastPlayer.src = null;
                broadcastPlayer.srcObject = incomingFeed;
                liveBadge.style.display = "block";
            });
        });
    </script>
</body>
</html>
