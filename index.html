<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareBroadCast - RGB Player Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>

    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-card: #141414;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .device-status-bar {
            background-color: #000000;
            color: #00ffcc;
            text-align: center;
            padding: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px solid #222;
        }

        /* Login Gateway Overlay */
        #authOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .auth-card {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            border: 2px solid #ff0055;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.3);
        }

        #mainAppWrapper {
            display: none;
        }

        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #000000;
            border-bottom: 2px solid #ff0055;
        }

        .site-header h1 {
            margin: 0;
            font-size: 1.6rem;
            color: #ff0055;
            letter-spacing: 1px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #00ffcc;
            background-color: #333;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }

        /* --- THE RGB VIDEO PLAYER FRAMEWORK --- */
        .player-box {
            background-color: #000000;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            
            /* Dynamic RGB Flow Border Effect */
            border: 3px solid transparent;
            background-image: linear-gradient(#000, #000), 
                              linear-gradient(90deg, #ff0055, #00ffcc, #ffcc00, #ff0055);
            background-origin: border-box;
            background-clip: content-box, border-box;
            background-size: 300% 300%;
            animation: rgbShift 6s linear infinite;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.15);
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: contain;
            display: block;
        }

        .live-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #ff0055;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            display: none;
            z-index: 5;
            box-shadow: 0 0 10px #ff0055;
        }

        /* CUSTOM RGB PLAYER CONTROLS PANEL */
        .custom-controls {
            background-color: #050505;
            display: flex;
            align-items: center;
            padding: 12px 18px;
            gap: 15px;
            
            /* Top border shifting line */
            border-top: 1px solid transparent;
            background-image: linear-gradient(#050505, #050505), 
                              linear-gradient(90deg, #00ffcc, #ff0055, #00ffcc);
            background-origin: border-box;
            background-clip: content-box, border-box;
            background-size: 200% 100%;
            animation: rgbShift 4s linear infinite;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.1s, color 0.2s;
        }

        .control-btn:hover {
            color: #00ffcc;
            transform: scale(1.1);
        }

        /* Custom RGB Range Sliders */
        .seek-slider {
            flex-grow: 1;
            accent-color: #ff0055;
            cursor: pointer;
            height: 6px;
            border-radius: 3px;
        }

        .time-display {
            font-size: 0.85rem;
            color: #00ffcc;
            font-family: monospace;
            min-width: 90px;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            width: 70px;
            accent-color: #00ffcc;
            cursor: pointer;
        }

        /* ANIMATION TIMELINES */
        @keyframes rgbShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Dashboard Styles */
        .dashboard {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #222;
            margin-top: 15px;
        }

        .section-title {
            margin-top: 0;
            font-size: 1.1rem;
            color: #00ffcc;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #ff0055;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .btn-stream { background-color: #00ffcc; color: #000; }
        .btn-stop { background-color: #ff3333; display: none; }

        .input-box {
            width: 100%;
            background-color: #0d0d0d;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            font-size: 0.95rem;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .feed-scrollbox {
            max-height: 350px;
            overflow-y: auto;
        }

        .feed-card {
            background-color: #1a1a1a;
            border-left: 4px solid #00ffcc;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .feed-card.is-live { border-left-color: #ff0055; }
        .feed-card h4 { margin: 0 0 4px 0; font-size: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .feed-card p { margin: 0; font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }

        .type-pill {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 3px;
            background: #333;
            color: #fff;
        }

        @media (min-width: 768px) {
            .app-container { grid-template-columns: 2fr 1fr; }
            .btn { width: auto; }
        }
    </style>
</head>
<body>

    <div class="device-status-bar" id="deviceDisplayBar">DETECTING ECOSYSTEM NODE...</div>

    <div id="authOverlay">
        <div class="auth-card">
            <h2 style="color: #ff0055; margin-top: 0;">SHAREBROADCAST</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px;">Connect your account profile to access active channels and saved media files.</p>
            <input type="text" id="authUsernameInput" class="input-box" placeholder="Enter Channel Username..." style="text-align: center;">
            <button class="btn" id="secureGatewayBtn" style="width: 100%;">Instant Secure Connect</button>
        </div>
    </div>

    <div id="mainAppWrapper">
        <header class="site-header">
            <h1>SHAREBROADCAST</h1>
            <div class="user-profile">
                <div class="user-avatar" id="avatarDisplay" style="display: flex; align-items: center; justify-content: center; font-weight: bold; color: #00ffcc;">U</div>
                <span id="userNameDisplay" style="font-size: 0.9rem; font-weight: 600;">Profile</span>
            </div>
        </header>

        <div class="app-container">
            <main>
                <div class="player-box">
                    <div class="live-tag" id="liveIndicatorTag">Live Stream</div>
                    
                    <video id="broadcastPlayer" autoplay playsinline></video>
                    
                    <div class="custom-controls" id="customControlsBar">
                        <button class="control-btn" id="playPauseBtn">▶</button>
                        
                        <input type="range" id="seekSlider" class="seek-slider" min="0" max="100" value="0">
                        
                        <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
                        
                        <div class="volume-container">
                            <button class="control-btn" id="muteBtn" style="font-size: 0.95rem;">🔊</button>
                            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.1" value="1">
                        </div>
                    </div>
                </div>

                <div class="dashboard">
                    <h3 class="section-title">Live Studio</h3>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-top:0;">
                        Channel Routing Key: <strong id="networkKeyDisplay" style="color:#00ffcc;">Connecting...</strong>
                    </p>
                    <input type="text" id="streamTitleInput" class="input-box" placeholder="Stream Title (Optional)">
                    <input type="text" id="streamDescInput" class="input-box" placeholder="Stream Description (Optional)">
                    <button class="btn btn-stream" id="initiateStreamBtn">Start Live Feed</button>
                    <button class="btn btn-stop" id="terminateStreamBtn">End Live Feed</button>
                </div>

                <div class="dashboard">
                    <h3 class="section-title">Save & Publish Media Files</h3>
                    <input type="text" id="uploadTitleInput" class="input-box
